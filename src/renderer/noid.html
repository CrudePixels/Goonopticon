<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    img { display: block; width: 100%; height: 100%; object-fit: contain; }
    .noid-close {
      position: absolute; top: 4px; right: 4px; width: 28px; height: 28px;
      border: none; background: rgba(0,0,0,0.6); color: #fff; font-size: 18px;
      cursor: pointer; border-radius: 4px; z-index: 1; line-height: 1;
    }
    .noid-close:hover { background: rgba(255,0,0,0.6); }

    body.noid-flash { animation: noidFlash 0.35s ease-out; }
    @keyframes noidFlash {
      0% { filter: brightness(1); }
      50% { filter: brightness(2) saturate(1.8); background: #4a1010; }
      100% { filter: brightness(1); }
    }

    body.noid-shake { animation: noidShake 0.5s ease-in-out; }
    @keyframes noidShake {
      0%, 100% { transform: translate(0,0); }
      20% { transform: translate(-6px, 2px); }
      40% { transform: translate(6px, -2px); }
      60% { transform: translate(-4px, 5px); }
      80% { transform: translate(4px, -5px); }
    }

    body.noid-glitch { overflow: hidden; }
    body.noid-glitch::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,0,0,0.18) 2px,
        rgba(255,0,0,0.18) 4px
      );
      animation: noidScan 0.12s steps(2) infinite;
    }
    @keyframes noidScan {
      0%, 100% { opacity: 0.55; }
      50% { opacity: 1; }
    }

    img.noid-swap-pop { animation: noidSwapPop 0.25s ease-out; }
    @keyframes noidSwapPop {
      0% { transform: scale(1); }
      50% { transform: scale(1.03); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>
  <img id="noid-img" alt="" />
  <button type="button" class="noid-close" id="noid-close" title="Close">×</button>
  <script>
    window.noidAPI?.onImage?.((url) => {
      const el = document.getElementById('noid-img');
      if (el && url) el.src = url;
    });

    const btnClose = document.getElementById('noid-close');
    const imgEl = document.getElementById('noid-img');

    function runBodyClass(cls, ms = 400) {
      document.body.classList.add(cls);
      setTimeout(() => document.body.classList.remove(cls), ms);
    }

    function swapPop() {
      if (!imgEl) return;
      imgEl.classList.remove('noid-swap-pop');
      // Force reflow to restart animation
      // eslint-disable-next-line no-unused-expressions
      imgEl.offsetHeight;
      imgEl.classList.add('noid-swap-pop');
    }

    btnClose?.addEventListener('click', () => {
      window.noidAPI?.tryClose?.();
    });

    window.noidAPI?.onTrick?.((payload) => {
      const effect = payload?.effect || 'shake';
      switch (effect) {
        case 'swap': {
          const url = payload?.imageUrl;
          if (url && imgEl) {
            imgEl.src = url;
            swapPop();
          }
          break;
        }
        case 'flash':
          runBodyClass('noid-flash', 360);
          break;
        case 'glitch':
          runBodyClass('noid-glitch', 420);
          break;
        case 'shake':
        default:
          runBodyClass('noid-shake', 560);
          break;
      }
    });
  </script>
</body>
</html>
