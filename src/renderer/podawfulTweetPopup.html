<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; frame-src https://platform.twitter.com https://syndication.twitter.com https://twitter.com https://x.com https://*.twimg.com; script-src 'self' 'unsafe-inline' https://platform.twitter.com; style-src 'self' 'unsafe-inline'; img-src https: data: blob:; connect-src https:; font-src https: data:;" />
  <title>@podawful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; background: #0d1117; color: #e6edf3; font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 13px; overflow: hidden; }
    .shell {
      height: 100%;
      display: flex;
      flex-direction: column;
      border: 1px solid #30363d;
      box-shadow: 0 0 0 1px rgba(56, 139, 253, 0.25), 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      background: linear-gradient(90deg, #161b22, #0d1117);
      border-bottom: 1px solid #388bfd44;
    }
    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      color: #58a6ff;
      text-transform: uppercase;
    }
    .btn-row { display: flex; gap: 8px; flex-shrink: 0; }
    button {
      font-family: inherit;
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #c9d1d9;
      cursor: pointer;
    }
    button.primary {
      border-color: #388bfd;
      color: #58a6ff;
    }
    button:hover { background: #30363d; }
    .snippet {
      flex-shrink: 0;
      margin: 0;
      padding: 12px;
      line-height: 1.45;
      max-height: 120px;
      overflow-y: auto;
      border-bottom: 1px solid #21262d;
      color: #8b949e;
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .snippet:empty { display: none; }
    .embed-wrap {
      flex: 1;
      min-height: 0;
      position: relative;
      background: #010409;
    }
    .embed-wrap iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <span class="label">New post</span>
      <div class="btn-row">
        <button type="button" class="primary" id="btn-open-x">Open on X</button>
        <button type="button" id="btn-close">Close</button>
      </div>
    </header>
    <p class="snippet" id="snippet"></p>
    <div class="embed-wrap">
      <iframe id="tweet-frame" title="Tweet embed" allowfullscreen></iframe>
    </div>
  </div>
  <script src="./podawfulTweetPopup.js"></script>
</body>
</html>
