<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Overlay</title>
  <link rel="stylesheet" href="./styles/theme.css" />
  <link rel="stylesheet" href="./styles/surveillance.css" />
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: rgba(8,9,10,0.94); color: var(--hud-text); font-family: system-ui, sans-serif; font-size: 12px; }
    .overlay { display: flex; flex-direction: column; height: 100vh; border: 1px solid var(--hud-border); }
    .overlay-header { padding: 6px 10px; background: var(--hud-surface); border-bottom: 1px solid var(--hud-border); display: flex; justify-content: space-between; align-items: center; cursor: move; -webkit-app-region: drag; font-family: var(--hud-font-mono); font-size: 10px; letter-spacing: 0.12em; color: var(--hud-accent); }
    .overlay-drag { -webkit-app-region: no-drag; background: none; border: none; color: var(--hud-text-dim); cursor: pointer; font-size: 18px; line-height: 1; padding: 0 4px; }
    .overlay-drag:hover { color: var(--hud-text); }
    .overlay-body { flex: 1; overflow: auto; padding: 8px; min-height: 0; }
    .overlay-url { margin-bottom: 8px; display: flex; gap: 4px; }
    .overlay-url input { flex: 1; padding: 4px 8px; background: var(--hud-bg-elevated); border: 1px solid var(--hud-border); color: var(--hud-text); font-family: var(--hud-font-mono); font-size: 11px; }
    .overlay-url .hud-btn { padding: 4px 10px; font-size: 10px; }
    .overlay-item { padding: 4px 6px; display: flex; justify-content: space-between; align-items: center; gap: 6px; border-bottom: 1px solid var(--hud-border); }
    .overlay-item:hover { background: var(--hud-surface); }
    .overlay-item-time { font-variant-numeric: tabular-nums; font-family: var(--hud-font-mono); font-size: 11px; color: var(--hud-accent); min-width: 48px; }
    .overlay-item-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 11px; }
    .overlay-item .btn-jump { padding: 2px 6px; font-size: 10px; font-family: var(--hud-font-mono); background: transparent; border: 1px solid var(--hud-accent); color: var(--hud-accent); cursor: pointer; }
    .overlay-item .btn-jump:hover { box-shadow: 0 0 6px var(--hud-glow); }
    .overlay-empty { padding: 12px; text-align: center; color: var(--hud-text-dim); font-size: 11px; }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="overlay-header">
      <span class="overlay-title">[ OVERLAY HUD ]</span>
      <button type="button" class="overlay-drag" id="btn-close" title="Close overlay window">×</button>
    </div>
    <div class="overlay-body">
      <div class="overlay-url">
        <input type="text" id="video-url" class="hud-input" placeholder="Video URL" style="flex:1;" />
        <button type="button" class="hud-btn" id="btn-load" title="Load video URL and fetch notes">Acquire Video</button>
      </div>
      <div id="notes-list"></div>
    </div>
  </div>
  <script type="module" src="./overlay.js"></script>
</body>
</html>
