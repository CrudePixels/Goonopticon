<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Goonopticon Security Breach</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Segoe UI Symbol", Tahoma, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      overflow: hidden;
      user-select: none;
    }
    .title-bar {
      height: 38px;
      background: linear-gradient(180deg, #161b22 0%, #21262d 100%);
      border-bottom: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 0 0 12px;
      -webkit-app-region: drag;
      gap: 10px;
    }
    .title-bar-icon {
      width: 20px;
      height: 20px;
      background: #f85149;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      flex-shrink: 0;
    }
    .title-bar span {
      font-size: 13px;
      color: #8b949e;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .title-bar .btn {
      -webkit-app-region: no-drag;
      width: 46px;
      height: 38px;
      border: none;
      background: transparent;
      color: #8b949e;
      font-size: 16px;
      cursor: pointer;
      padding: 0;
    }
    .title-bar .btn:hover { background: #30363d; color: #e6edf3; }
    .title-bar .btn-close:hover { background: #f85149; color: #fff; }

    .content {
      min-height: 300px;
      display: flex;
      flex-direction: column;
      padding: 0;
    }
    .scan-phase {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .scan-header {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .scan-phase .icon {
      width: 56px;
      height: 56px;
      flex-shrink: 0;
      background: linear-gradient(135deg, #da3633 0%, #b62324 100%);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      animation: pulse 1s ease-in-out infinite;
      box-shadow: 0 0 20px rgba(248, 81, 73, 0.3);
    }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.02); } }
    .scan-header-text h2 {
      margin: 0 0 4px;
      font-size: 18px;
      font-weight: 600;
      color: #f85149;
    }
    .scan-header-text p {
      margin: 0;
      font-size: 12px;
      color: #8b949e;
    }
    .scan-severity {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(248, 81, 73, 0.2);
      border: 1px solid #f85149;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #ff7b72;
      margin-top: 6px;
    }
    .scan-log {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 12px;
      height: 100px;
      overflow: hidden;
      font-family: "Consolas", "Monaco", monospace;
      font-size: 11px;
      color: #8b949e;
      line-height: 1.6;
    }
    .scan-log-line {
      opacity: 0;
      animation: logLineIn 0.3s ease-out forwards;
    }
    @keyframes logLineIn { to { opacity: 1; } }
    .scan-log-line.warn { color: #d29922; }
    .scan-log-line.danger { color: #f85149; font-weight: 600; }
    .scan-progress-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .scan-progress-wrap .progress {
      flex: 1;
      height: 8px;
      background: #21262d;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-inner {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #238636, #2ea043);
      border-radius: 4px;
      animation: scan 1.4s ease-out forwards;
    }
    @keyframes scan { to { width: 100%; } }
    .scan-percent {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      min-width: 36px;
    }

    .video-phase {
      display: none;
      flex: 1;
      min-height: 260px;
      background: #000;
      position: relative;
    }
    .video-phase.active { display: flex; flex-direction: column; }
    .video-phase video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      flex: 1;
    }
    .video-overlay-top {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 8px 12px;
      background: linear-gradient(180deg, rgba(0,0,0,0.85) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      pointer-events: none;
    }
    .video-overlay-top .badge {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: #ff6b6b;
      text-shadow: 0 0 8px rgba(255,0,0,0.6);
    }
    .video-overlay-top .live-dot {
      width: 6px;
      height: 6px;
      background: #f85149;
      border-radius: 50%;
      animation: livePulse 1s ease-in-out infinite;
    }
    @keyframes livePulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .video-overlay-bottom {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 10px 12px;
      background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 100%);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      pointer-events: auto;
    }
    .video-overlay-bottom .strip {
      font-size: 10px;
      color: #8b949e;
    }
    .virus-fake-btn {
      padding: 6px 14px;
      font-size: 11px;
      font-weight: 600;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      color: #e6edf3;
      cursor: pointer;
      pointer-events: auto;
      transition: background 0.15s, border-color 0.15s;
    }
    .virus-fake-btn:hover {
      background: #30363d;
      border-color: #8b949e;
    }
    .virus-fake-btn.primary {
      background: #388bfd;
      border-color: #388bfd;
      color: #fff;
    }
    .virus-fake-btn.primary:hover { background: #58a6ff; border-color: #58a6ff; }
    .virus-status-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 24px;
      background: rgba(0,0,0,0.75);
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      padding: 0 12px;
      font-size: 10px;
      color: #8b949e;
      pointer-events: none;
    }
    .virus-timer {
      font-family: "Consolas", monospace;
      font-size: 11px;
      color: #f85149;
      margin-left: auto;
    }

    .virus-actions {
      padding: 12px 16px;
      background: #161b22;
      border-top: 1px solid #30363d;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .virus-actions-left { display: flex; align-items: center; gap: 12px; }
    .virus-checkbox {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #8b949e;
      cursor: pointer;
      pointer-events: auto;
    }
    .virus-checkbox input { cursor: pointer; }
    .virus-actions-right { display: flex; gap: 8px; }

    .virus-restart-banner {
      display: none;
      padding: 10px 16px;
      background: rgba(248, 81, 73, 0.2);
      border: 1px solid #f85149;
      border-radius: 8px;
      margin: 12px 16px;
      font-size: 13px;
      color: #ff7b72;
      text-align: center;
    }
    .virus-restart-banner.active { display: block; }
    .virus-restart-banner .countdown { font-weight: 700; font-size: 18px; }

    .virus-toast {
      position: fixed;
      bottom: 60px;
      right: 16px;
      padding: 12px 18px;
      background: #21262d;
      border: 1px solid #30363d;
      border-radius: 8px;
      font-size: 12px;
      color: #e6edf3;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      z-index: 9997;
      cursor: pointer;
      transform: translateX(120%);
      transition: transform 0.3s ease-out;
      pointer-events: auto;
      max-width: 280px;
    }
    .virus-toast.visible { transform: translateX(0); }
    .virus-toast:hover { background: #30363d; }

    #virus-trick-overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      display: none;
    }
    #virus-trick-overlay.active { display: block; }
    #virus-giant-text {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #ff4444;
      font-size: clamp(24px, 8vw, 72px);
      font-weight: bold;
      text-align: center;
      padding: 20px;
      text-shadow: 0 0 20px #ff0000;
      animation: virusPulse 0.5s ease-in-out infinite alternate;
      z-index: 9998;
    }
    @keyframes virusPulse { from { opacity: 0.9; } to { opacity: 1; } }
    .clickhead-img {
      position: absolute;
      width: 80px;
      height: 80px;
      object-fit: contain;
      pointer-events: none;
    }
    body.flash-red { animation: flashRed 0.4s ease-out; }
    @keyframes flashRed {
      0% { background: #0d1117; }
      50% { background: #4a1010; }
      100% { background: #0d1117; }
    }
    body.shake { animation: shake 0.5s ease-in-out; }
    @keyframes shake {
      0%, 100% { transform: translate(0,0); }
      20% { transform: translate(-8px, 4px); }
      40% { transform: translate(8px, -4px); }
      60% { transform: translate(-6px, 6px); }
      80% { transform: translate(6px, -6px); }
    }
    body.virus-glitch { overflow: hidden; }
    body.virus-glitch::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.15) 2px,
        rgba(0,0,0,0.15) 4px
      );
      animation: glitchScanlines 0.15s steps(2) infinite;
    }
    @keyframes glitchScanlines {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    body.virus-glitch { animation: glitch 0.35s steps(1) forwards; }
    @keyframes glitch {
      0%   { transform: translate(0, 0);     filter: hue-rotate(0deg) contrast(1); }
      10%  { transform: translate(-3px, 1px); filter: hue-rotate(5deg) contrast(1.15); }
      20%  { transform: translate(2px, -2px); filter: hue-rotate(-8deg) contrast(1.1); }
      30%  { transform: translate(1px, 2px); filter: hue-rotate(3deg) contrast(1.2); }
      40%  { transform: translate(-2px, -1px); filter: hue-rotate(-5deg) contrast(1.05); }
      50%  { transform: translate(3px, 0);   filter: hue-rotate(8deg) contrast(1.15); }
      60%  { transform: translate(-1px, -2px); filter: hue-rotate(-3deg) contrast(1.1); }
      70%  { transform: translate(2px, 1px); filter: hue-rotate(4deg) contrast(1.2); }
      80%  { transform: translate(-2px, 2px); filter: hue-rotate(-4deg) contrast(1.05); }
      90%  { transform: translate(1px, -1px); filter: hue-rotate(2deg) contrast(1.1); }
      100% { transform: translate(0, 0);     filter: hue-rotate(0deg) contrast(1); }
    }
  </style>
</head>
<body>
  <div class="title-bar">
    <div class="title-bar-icon">⚠</div>
    <span id="virus-title">Goonopticon Security Breach</span>
    <button class="btn btn-close" type="button" id="btn-close" title="Close">✕</button>
  </div>
  <div class="content">
    <div class="scan-phase" id="scan-phase">
      <div class="scan-header">
        <div class="icon">⚠</div>
        <div class="scan-header-text">
          <h2>Threat detected</h2>
          <p>Windows Security has identified a critical issue.</p>
          <div class="scan-severity">● Critical — Action required</div>
        </div>
      </div>
      <div class="scan-log" id="scan-log"></div>
      <div class="scan-progress-wrap">
        <div class="progress"><div class="progress-inner"></div></div>
        <span class="scan-percent" id="scan-percent">0%</span>
      </div>
    </div>
    <div class="video-phase" id="video-phase">
      <div class="video-overlay-top">
        <span class="badge">AWFULTECH CRISIS SUPPORT</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span class="live-dot"></span>
          <span class="badge">LIVE</span>
        </div>
      </div>
      <video id="virus-video" playsinline></video>
      <div class="video-overlay-bottom">
        <span class="strip">podawful.com/cult</span>
        <button type="button" class="virus-fake-btn primary" id="btn-discord">Link Discord Account</button>
        <span class="virus-timer" id="virus-timer">00:00</span>
      </div>
      <div class="virus-status-bar">
        <span id="virus-status-text">Streaming…</span>
      </div>
    </div>
    <div class="virus-restart-banner" id="virus-restart-banner">
      <span class="countdown" id="virus-restart-countdown">60</span> seconds until your PC restarts to remove the threat.
    </div>
  </div>
  <div class="virus-toast" id="virus-toast" title="Click to dismiss"></div>
  <div id="virus-trick-overlay"></div>
  <script src="virusPopup.js"></script>
</body>
</html>
