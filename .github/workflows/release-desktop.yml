# Windows portable .exe + macOS .dmg on the same GitHub Release for the tag.
# Usage: git tag v0.2.3 && git push origin v0.2.3
# macOS runs after Windows so the release exists before attaching the DMG (avoids API races).

name: Release Desktop

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Clone Goonopticon-Extension (sibling path for prepare-extension)
        run: git clone --depth 1 https://github.com/CrudePixels/Goonopticon-Extension.git "${{ github.workspace }}/../Goonopticon-Extension"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Windows (portable .exe)
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify portable exe exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath dist -Filter *.exe -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          $exe = Get-ChildItem -LiteralPath dist -Filter *.exe -File -ErrorAction SilentlyContinue
          if (-not $exe) { throw "No .exe in dist/. Listing dist:" ; Get-ChildItem -Recurse dist }

      - name: Upload release assets (tag) — Windows
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          working_directory: dist
          files: '*.exe'
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual / branch test build)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: goonopticon-windows
          path: 'dist/*.exe'

  macos:
    needs: [windows]
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Clone Goonopticon-Extension (sibling path for prepare-extension)
        run: git clone --depth 1 https://github.com/CrudePixels/Goonopticon-Extension.git "${{ github.workspace }}/../Goonopticon-Extension"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build macOS (DMG)
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify DMG exists
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          ls -la dist/*.dmg || true
          test -n "$(ls dist/*.dmg 2>/dev/null)" || (echo 'No .dmg in dist/'; ls -laR dist; exit 1)

      - name: Upload release assets (tag) — macOS
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          working_directory: dist
          files: '*.dmg'
          fail_on_unmatched_files: true
          # Release metadata already set by Windows job
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual / branch test build)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: goonopticon-macos
          path: 'dist/*.dmg'
