# Builds one Windows portable .exe and attaches it to the GitHub Release for the tag.
# Usage: git tag v0.1.1 && git push origin v0.1.1
# Re-run failed releases: Actions → Release Windows → Run workflow → pick the tag (e.g. v0.2.1).

name: Release Windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Clone Goonopticon-Extension (sibling path for prepare-extension)
        run: git clone --depth 1 https://github.com/CrudePixels/Goonopticon-Extension.git "${{ github.workspace }}/../Goonopticon-Extension"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build Windows (portable .exe)
        run: npm run build:win
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify portable exe exists
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          Get-ChildItem -LiteralPath dist -Filter *.exe -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          $exe = Get-ChildItem -LiteralPath dist -Filter *.exe -File -ErrorAction SilentlyContinue
          if (-not $exe) { throw "No .exe in dist/. Listing dist:" ; Get-ChildItem -Recurse dist }

      - name: Upload release assets (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          # Quote globs: bare dist/*.exe is invalid YAML (unquoted * is an alias).
          working_directory: dist
          files: '*.exe'
          generate_release_notes: true
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact (manual / branch test build)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: goonopticon-windows
          path: 'dist/*.exe'
